# Colors from your custom theme
$base     = #0b0e13
$mantle   = #191c20
$crust    = #111418
$text     = #e1e2e8
$subtext0 = #c3c6cf
$subtext1 = #8d9199
$surface0 = #1d2024
$surface1 = #272a2f
$surface2 = #32353a
$blue     = #a1c9fd
$mauve    = #d7bde4
$red      = #ffb4ab
$green    = #bbc7db
$peach    = #d7bde4

background {
  monitor =
  path = /tmp/lock_bg.png
  blur_passes = 5
  blur_size = 12
  noise = 0.01
  contrast = 0.85
  brightness = 0.75
  vibrancy = 0.2
  vibrancy_darkness = 0.0
}

general {
  no_fade_in = false
  no_fade_out = false
  grace = 0
  ignore_empty_input = false
  pam_left_handed = false
}

# Ambient orb — large, mauve-tinted (mirrors the big rotating mauve circle in Lock.qml)
shape {
  monitor =
  size = 900, 900
  color = rgba(215, 189, 228, 0.08)
  rounding = -1
  border_size = 0
  xoffset = -200
  yoffset = -150
  shadow_passes = 0
}

# Ambient orb — large, blue-tinted (mirrors the second rotating blue circle in Lock.qml)
shape {
  monitor =
  size = 1000, 1000
  color = rgba(161, 201, 253, 0.06)
  rounding = -1
  border_size = 0
  xoffset = 200
  yoffset = 150
  shadow_passes = 0
}

# Concentric ring 1 (mirrors the 4-ring Repeater at ~400px base in Lock.qml)
shape {
  monitor =
  size = 400, 400
  color = rgba(0, 0, 0, 0)
  rounding = -1
  border_size = 1
  border_color = rgba(225, 226, 232, 0.04)
  xoffset = 0
  yoffset = -40
  halign = center
  valign = center
}

# Concentric ring 2
shape {
  monitor =
  size = 620, 620
  color = rgba(0, 0, 0, 0)
  rounding = -1
  border_size = 1
  border_color = rgba(225, 226, 232, 0.03)
  xoffset = 0
  yoffset = -40
  halign = center
  valign = center
}

# Concentric ring 3
shape {
  monitor =
  size = 840, 840
  color = rgba(0, 0, 0, 0)
  rounding = -1
  border_size = 1
  border_color = rgba(225, 226, 232, 0.02)
  xoffset = 0
  yoffset = -40
  halign = center
  valign = center
}

# Concentric ring 4
shape {
  monitor =
  size = 1060, 1060
  color = rgba(0, 0, 0, 0)
  rounding = -1
  border_size = 1
  border_color = rgba(225, 226, 232, 0.01)
  xoffset = 0
  yoffset = -40
  halign = center
  valign = center
}

# ── CLOCK ──────────────────────────────────────────────────────────────────────
# 140px bold, color = $text  (matches clockHours/clockMinutes in Lock.qml)
label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%H:%M')"
  text_align = center
  color = $text
  font_size = 140
  font_family = JetBrains Mono Bold
  position = 0, -260
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 20
  shadow_color = rgba(0, 0, 0, 0.9)
  shadow_boost = 2.0
}

# ── DATE ───────────────────────────────────────────────────────────────────────
# "dddd, MMMM dd" — color = $text, bold  (matches dateText in Lock.qml)
label {
  monitor =
  text = cmd[update:60000] echo "$(date '+%A, %B %d')"
  text_align = center
  color = $text
  font_size = 22
  font_family = JetBrains Mono Bold
  position = 0, -120
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(0, 0, 0, 0.8)
  shadow_boost = 1.5
}

# ── STATUS LABEL ───────────────────────────────────────────────────────────────
# "LOCKED" uppercase, small, letter-spaced — matches the status text row in Lock.qml
# Uses $mauve to mirror the mauve icon circle accent
label {
  monitor =
  text = LOCKED
  text_align = center
  color = $mauve
  font_size = 13
  font_family = JetBrains Mono Medium
  position = 0, -60
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.4)
}

# ── INPUT FIELD ────────────────────────────────────────────────────────────────
# Pill shape: height=60, wide rounding — matches pinPill (280×60, radius=height/2) in Lock.qml
# Border is subtle (rgba text 0.08) at rest; accent is mauve not blue
input-field {
  monitor =
  size = 320, 60
  outline_thickness = 2
  dots_size = 0.28
  dots_spacing = 0.3
  dots_center = true
  outer_color = $mauve
  inner_color = rgba(29, 32, 36, 0.50)
  font_color = $text
  fade_on_empty = true
  placeholder_text =
  hide_input = false
  rounding = 30
  check_color = $green
  fail_color = $red
  fail_transition = 300
  capslock_color = $peach
  numlock_color = $mauve
  bothlock_color = $mauve
  invert_numlock = false
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(215, 189, 228, 0.25)
  shadow_boost = 1.2
  position = 0, 40
  halign = center
  valign = center
}

# ── BOTTOM STATUS ──────────────────────────────────────────────────────────────
# Mirrors the bottom system-info row in Lock.qml (subtext0, small, subtle)
label {
  monitor =
  text = cmd[update:30000] echo "$(date '+%H:%M')"
  text_align = center
  color = rgba(139, 145, 153, 0.6)
  font_size = 12
  font_family = JetBrains Mono
  position = 0, 280
  halign = center
  valign = center
}
