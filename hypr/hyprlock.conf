# Colors from your custom theme
$base = #0b0e13
$mantle = #191c20
$crust = #111418
$text = #e1e2e8
$subtext0 = #c3c6cf
$subtext1 = #8d9199
$surface0 = #1d2024
$surface1 = #272a2f
$surface2 = #32353a
$blue = #a1c9fd
$peach = #d7bde4
$red = #ffb4ab
$green = #bbc7db

background {
  monitor =
  path = /tmp/lock_bg.png
  blur_passes = 5
  blur_size = 12
  noise = 0.01
  contrast = 0.85
  brightness = 0.7
  vibrancy = 0.2
  vibrancy_darkness = 0.0
}

general {
  no_fade_in = false
  no_fade_out = false
  grace = 0
  ignore_empty_input = false
  pam_left_handed = false
}

# Decorative circle - top left (like Lock.qml orbits)
shape {
  monitor =
  size = 400, 400
  color = rgba(161, 201, 253, 0.08)
  rounding = -1
  border_size = 0
  rotate = 0
  xoffset = -150
  yoffset = -200
  shadow_passes = 2
  shadow_size = 20
  shadow_color = rgba(0, 0, 0, 0.3)
}

# Decorative circle - bottom right
shape {
  monitor =
  size = 350, 350
  color = rgba(215, 189, 228, 0.06)
  rounding = -1
  border_size = 0
  rotate = 0
  xoffset = 200
  yoffset = 150
  shadow_passes = 2
  shadow_size = 20
  shadow_color = rgba(0, 0, 0, 0.3)
}

# Time - BIG and bold
label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%H:%M')"
  text_align = center
  color = $text
  font_size = 120
  font_family = JetBrains Mono
  font_weight = bold
  position = 0, -280
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 20
  shadow_color = rgba(0, 0, 0, 0.9)
  shadow_boost = 2.0
}

# Date
label {
  monitor =
  text = cmd[update:60000] echo "$(date '+%A, %B %d, %Y')"
  text_align = center
  color = $subtext0
  font_size = 22
  font_family = JetBrains Mono
  position = 0, -160
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 12
  shadow_color = rgba(0, 0, 0, 0.8)
  shadow_boost = 1.5
}

# Separator line (visual)
shape {
  monitor =
  size = 200, 2
  color = $blue
  opacity = 0.3
  rounding = 1
  border_size = 0
  rotate = 0
  position = 0, -120
  halign = center
  valign = center
}

# Greeting
label {
  monitor =
  text = Welcome back
  text_align = center
  color = $blue
  font_size = 20
  font_family = JetBrains Mono
  position = 0, -80
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 8
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.0
}

# Input field - styled nicely
input-field {
  monitor =
  size = 360, 80
  outline_thickness = 3
  dots_size = 0.25
  dots_spacing = 0.35
  dots_center = true
  outer_color = $blue
  inner_color = rgba(29, 32, 36, 0.95)
  font_color = $text
  fade_on_empty = true
  placeholder_text = 
  hide_input = true
  rounding = 14
  check_color = $green
  fail_color = $red
  fail_transition = 300
  capslock_color = $peach
  numlock_color = $blue
  bothlock_color = $blue
  invert_numlock = false
  shadow_passes = 4
  shadow_size = 20
  shadow_color = rgba(161, 201, 253, 0.4)
  shadow_boost = 1.5
  position = 0, 0
  halign = center
  valign = center
}

# Status hint below input
label {
  monitor =
  text = Password
  text_align = center
  color = $subtext1
  font_size = 14
  font_family = JetBrains Mono
  position = 0, 110
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_color = rgba(0, 0, 0, 0.4)
  shadow_boost = 1.0
}

# Bottom info - system status
label {
  monitor =
  text = cmd[update:30000] echo "Locked at $(date '+%H:%M')"
  text_align = center
  color = rgba(139, 145, 153, 0.6)
  font_size = 12
  font_family = JetBrains Mono
  position = 0, 280
  halign = center
  valign = center
}
