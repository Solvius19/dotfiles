# Colors - Actual theme colors from your setup
$base = #0b0e13
$mantle = #191c20
$crust = #111418
$text = #e1e2e8
$subtext0 = #c3c6cf
$subtext1 = #8d9199
$surface0 = #1d2024
$surface1 = #272a2f
$surface2 = #32353a
$blue = #a1c9fd
$peach = #d7bde4
$red = #ffb4ab
$green = #bbc7db
$yellow = #3c4858

# Background with enhanced blur and brightness control
background {
  monitor =
  path = /tmp/lock_bg.png
  blur_passes = 4
  blur_size = 10
  noise = 0.02
  contrast = 0.9
  brightness = 0.75
  vibrancy = 0.25
  vibrancy_darkness = 0.0
}

# General settings
general {
  no_fade_in = false
  no_fade_out = false
  hide_cursor = false
  graceful_reset = true
}

# Large time display at top
label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%H:%M')"
  text_align = center
  color = $text
  font_size = 96
  font_family = JetBrains Mono
  font_weight = bold
  position = 0, -240
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 15
  shadow_color = rgba(0, 0, 0, 0.8)
  shadow_boost = 1.5
}

# Date display
label {
  monitor =
  text = cmd[update:60000] echo "$(date '+%A, %B %d')"
  text_align = center
  color = $subtext0
  font_size = 20
  font_family = JetBrains Mono
  position = 0, -130
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(0, 0, 0, 0.8)
  shadow_boost = 1.2
}

# Greeting text
label {
  monitor =
  text = Welcome back
  text_align = center
  color = $text
  font_size = 24
  font_family = JetBrains Mono
  position = 0, 40
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 8
  shadow_color = rgba(0, 0, 0, 0.6)
  shadow_boost = 1.1
}

# Password input field - centered and prominent
input-field {
  monitor =
  size = 320, 70
  outline_thickness = 3
  dots_size = 0.22
  dots_spacing = 0.3
  dots_center = true
  outer_color = $blue
  inner_color = rgba(29, 32, 36, 0.9)
  font_color = $text
  fade_on_empty = true
  placeholder_text = Password
  hide_input = true
  rounding = 12
  check_color = $green
  fail_color = $red
  fail_transition = 300
  capslock_color = $peach
  numlock_color = $blue
  bothlock_color = $yellow
  invert_numlock = false
  shadow_passes = 3
  shadow_size = 15
  shadow_color = rgba(0, 0, 0, 0.7)
  shadow_boost = 1.3
  position = 0, -80
  halign = center
  valign = center
}

# Helper text below input
label {
  monitor =
  text = Enter password to unlock
  text_align = center
  color = $subtext1
  font_size = 14
  font_family = JetBrains Mono
  position = 0, -180
  halign = center
  valign = center
}
