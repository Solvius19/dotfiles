$base = #1e1e2e
$mantle = #181825
$crust = #11111b
$text = #cdd6f4
$subtext0 = #a6adc8
$surface0 = #313244
$surface1 = #45475a
$blue = #89b4fa
$peach = #fab387
$red = #f38ba8
$mauve = #cba6f7
$green = #a6e3a1

# Background & General
background {
  monitor =
  path = /tmp/lock_bg.png
  blur_passes = 3
  blur_size = 8
  noise = 0.05
  contrast = 1.0
  brightness = 0.8
  vibrancy = 0.3
  vibrancy_darkness = 0.0
}

# General colors
general {
  no_fade_in = false
  no_fade_out = false
  text_trim = true
}

# Main input field
input-field {
  monitor =
  size = 280, 60
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $mauve
  inner_color = $surface0
  font_color = $text
  fade_on_empty = false
  placeholder_text =
  hide_input = false
  rounding = 10
  check_color = $green
  fail_color = $red
  fail_text = $[1]
  fail_transition = 300
  capslock_color = $peach
  numlock_color = $blue
  bothlock_color = $yellow
  invert_numlock = false
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.2
  position = 0, -120
  halign = center
  valign = center
}

# User label
label {
  monitor =
  text = Hi there 👋
  text_align = center
  color = $text
  font_size = 32
  font_family = JetBrains Mono
  position = 0, 80
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 8
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.2
}

# Time display
label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%H:%M')"
  text_align = center
  color = $text
  font_size = 48
  font_family = JetBrains Mono
  position = 0, -200
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.2
}

# Date display
label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%A, %B %d')"
  text_align = center
  color = $subtext0
  font_size = 16
  font_family = JetBrains Mono
  position = 0, -250
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.0
}
